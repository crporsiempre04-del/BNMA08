<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tu Página</title>
    <!-- Mantenemos tus fuentes y añadimos Monoton para el toque neón -->
    <link href="https://fonts.googleapis.com/css2?family=Dancing+Script:wght@400..700&family=Monoton&display=swap" rel="stylesheet">
    
    <style>
        body {
            background-color: #000;
            color: white;
            font-family: "Dancing Script", cursive;
            margin: 0;
            overflow-x: hidden;
        }

        #bg {
            position: fixed;
            top: 0;
            left: 0;
            z-index: -1;
        }

        .main-container {
            display: flex;
            flex-direction: column;
            align-items: center;
            padding-top: 50px;
        }

        /* Tu título con la nueva fuente de neón */
        h1 {
            font-family: 'Monoton', cursive;
            font-size: 50px;
            text-align: center;
            color: #fff;
            text-shadow: 0 0 10px #bc13fe, 0 0 20px #bc13fe, 0 0 40px #bc13fe;
        }

        /* Tu imagen con el efecto que ya tenías */
        .twFloat {
            width: 250px;
            filter: drop-shadow(0 0 15px #bc13fe);
            animation: float 3s ease-in-out infinite;
        }

        @keyframes float {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-20px); }
        }

        /* El corazón que ya tenías */
        .heart {
            color: #ff00de;
            font-size: 50px;
            margin: 20px;
        }

        /* La nueva sección de proyectos sin romper lo anterior */
        .projects {
            display: flex;
            gap: 20px;
            margin-top: 30px;
            font-family: Arial, sans-serif; /* Fuente simple para leer mejor */
        }

        .card {
            border: 1px solid #bc13fe;
            padding: 15px;
            border-radius: 10px;
            background: rgba(188, 19, 254, 0.1);
        }
    </style>
</head>
<body>

    <canvas id="bg"></canvas>

    <div class="main-container">
        <h1>MI MUNDO</h1>
        
        <!-- Aquí va tu imagen -->
        <img src="tu-imagen.png" class="twFloat" alt="Logo">

        <div class="heart">❤</div>

        <!-- Seccion de proyectos integrada -->
        <div class="projects">
            <div class="card">
                <h3>PSeInt</h3>
                <p>Lógica y Algoritmos</p>
            </div>
            <div class="card">
                <h3>GitHub</h3>
                <p>Mis Repositorios</p>
            </div>
        </div>
    </div>

    <script>
        const canvas = document.getElementById('bg');
        const ctx = canvas.getContext('2d');
        let stars = [];

        function init() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
            stars = [];
            for (let i = 0; i < 100; i++) {
                stars.push({
                    x: Math.random() * canvas.width,
                    y: Math.random() * canvas.height,
                    size: Math.random() * 2,
                    speed: Math.random() * 0.5
                });
            }
        }

        function animate() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            ctx.fillStyle = '#fff';
            stars.forEach(s => {
                ctx.beginPath();
                ctx.arc(s.x, s.y, s.size, 0, Math.PI * 2);
                ctx.fill();
                s.y += s.speed;
                if (s.y > canvas.height) s.y = 0;
            });
            requestAnimationFrame(animate);
        }

        window.addEventListener('resize', init);
        init();
        animate();
    </script>
</body>
</html>
