<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Para Ti</title>
<link href="https://fonts.googleapis.com/css2?family=Dancing+Script:wght@700&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { margin:0; padding:0; box-sizing:border-box; }
html, body {
  width:100%; height:100vh; overflow:hidden;
  background:#06010e;
  display:flex; align-items:center; justify-content:center;
  flex-direction:column; gap:16px;
}
canvas#bg { position:fixed; inset:0; z-index:0; }
.stage {
  position:relative; z-index:10;
  display:flex; flex-direction:column;
  align-items:center; gap:12px;
}
.tw-wrap {
  position:relative;
  animation: twFloat 5s ease-in-out infinite;
  filter: drop-shadow(0 12px 45px rgba(210,80,230,0.6))
          drop-shadow(0 0 80px rgba(180,50,210,0.25));
}
@keyframes twFloat {
  0%,100% { transform: translateY(0px) rotate(-0.8deg); }
  50%      { transform: translateY(-16px) rotate(0.8deg); }
}
canvas#tw { display:block; width:280px; }
.horn-glow {
  position:absolute; top:2px; left:108px;
  width:55px; height:55px; border-radius:50%;
  background: radial-gradient(circle, rgba(240,100,255,0.95) 0%, rgba(180,50,230,0.55) 38%, transparent 72%);
  animation: hornPulse 1.7s ease-in-out infinite;
  pointer-events:none; mix-blend-mode:screen;
}
@keyframes hornPulse {
  0%,100% { transform:scale(1); opacity:0.65; }
  50%     { transform:scale(1.7); opacity:1; }
}
.spark {
  position:absolute; border-radius:50%; pointer-events:none; opacity:0;
  width:var(--s); height:var(--s); background:var(--c);
  box-shadow:0 0 8px var(--c), 0 0 20px var(--c);
  top:var(--y); left:var(--x);
  animation: sparkAnim var(--d) ease-out infinite var(--dl);
}
@keyframes sparkAnim {
  0%  { opacity:0; transform:translate(0,0) scale(0.3); }
  25% { opacity:1; }
  100%{ opacity:0; transform:translate(var(--tx),var(--ty)) scale(0.05); }
}
.heart-svg {
  width:72px; height:66px;
  animation: heartbeat 1.5s ease-in-out infinite;
  filter: drop-shadow(0 0 14px rgba(59,130,246,1)) drop-shadow(0 0 40px rgba(96,165,250,0.7));
}
@keyframes heartbeat {
  0%,100%{ transform:scale(1); } 14%{ transform:scale(1.3); }
  28%{ transform:scale(1); } 45%{ transform:scale(1.15); } 60%{ transform:scale(1); }
}
.para-ti {
  font-family:"Dancing Script", cursive;
  font-size:2.6rem; font-weight:700; color:#fff; letter-spacing:3px;
  animation: textGlow 3s ease-in-out infinite;
}
@keyframes textGlow {
  0%,100%{ text-shadow:0 0 18px rgba(59,130,246,0.9), 0 0 55px rgba(59,130,246,0.35); }
  50%    { text-shadow:0 0 32px rgba(96,165,250,1), 0 0 90px rgba(59,130,246,0.7); }
}
.bottom-row { display:flex; flex-direction:column; align-items:center; gap:8px; }
</style>
</head>
<body>
<canvas id="bg"></canvas>
<div class="stage">
  <div class="tw-wrap" id="twWrap">
    <canvas id="tw"></canvas>
    <div class="horn-glow"></div>
  </div>
  <div class="bottom-row">
    <svg class="heart-svg" viewBox="0 0 100 90" xmlns="http://www.w3.org/2000/svg">
      <defs>
        <radialGradient id="bhG" cx="38%" cy="30%" r="65%">
          <stop offset="0%" stop-color="#dbeafe"/>
          <stop offset="38%" stop-color="#3b82f6"/>
          <stop offset="100%" stop-color="#1e3a8a"/>
        </radialGradient>
        <filter id="bhF" x="-35%" y="-35%" width="170%" height="170%">
          <feGaussianBlur stdDeviation="2.5" result="b"/>
          <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
        </filter>
      </defs>
      <path filter="url(#bhF)" d="M50,82 C50,82 5,53 5,27 C5,12 16,3 30,3 C39,3 47,9 50,18 C53,9 61,3 70,3 C84,3 95,12 95,27 C95,53 50,82 50,82 Z" fill="url(#bhG)"/>
      <ellipse cx="33" cy="20" rx="13" ry="7.5" fill="rgba(255,255,255,0.3)" transform="rotate(-22,33,20)"/>
    </svg>
    <p class="para-ti">Para ti</p>
  </div>
</div>
<script>
const bgCv=document.getElementById("bg"),bgCtx=bgCv.getContext("2d");
function rsz(){bgCv.width=innerWidth;bgCv.height=innerHeight;}
rsz();addEventListener("resize",rsz);
const STARS=Array.from({length:320},()=>({x:Math.random(),y:Math.random(),r:Math.random()*1.3+0.15,base:Math.random()*0.42+0.05,spd:0.28+Math.random()*1.7,ph:Math.random()*Math.PI*2,violet:Math.random()<0.12}));
let t=0;
(function drawBg(){
  bgCtx.clearRect(0,0,bgCv.width,bgCv.height);
  const bg=bgCtx.createRadialGradient(bgCv.width*.35,bgCv.height*.2,0,bgCv.width*.5,bgCv.height*.5,bgCv.width);
  bg.addColorStop(0,"#1a0535");bg.addColorStop(0.45,"#0d0128");bg.addColorStop(0.8,"#070015");bg.addColorStop(1,"#030008");
  bgCtx.fillStyle=bg;bgCtx.fillRect(0,0,bgCv.width,bgCv.height);
  [[.18,.72,140,50,220,.07],[.82,.22,180,60,230,.05]].forEach(([fx,fy,r,g,b,a])=>{
    const n=bgCtx.createRadialGradient(bgCv.width*fx,bgCv.height*fy,0,bgCv.width*fx,bgCv.height*fy,bgCv.width*.38);
    n.addColorStop(0,`rgba(${r},${g},${b},${a})`);n.addColorStop(1,"transparent");
    bgCtx.fillStyle=n;bgCtx.fillRect(0,0,bgCv.width,bgCv.height);
  });
  t+=0.01;
  STARS.forEach(s=>{
    const a=Math.max(0,Math.min(1,s.base+Math.sin(t*s.spd+s.ph)*s.base*.88));
    bgCtx.beginPath();bgCtx.arc(s.x*bgCv.width,s.y*bgCv.height,s.r,0,Math.PI*2);
    bgCtx.fillStyle=s.violet?`rgba(200,160,255,${a})`:`rgba(255,255,255,${a})`;bgCtx.fill();
  });
  requestAnimationFrame(drawBg);
})();
const twCv=document.getElementById("tw"),twCtx=twCv.getContext("2d");
const wrap=document.getElementById("twWrap");
const cols=["#ff44ff","#ee22ff","#cc88ff","#ff99ee","#ffffff","#bbaaff"];
const img=new Image();
img.onload=function(){
  twCv.width=img.naturalWidth;twCv.height=img.naturalHeight;
  twCv.style.width="280px";
  twCv.style.height=(img.naturalHeight/img.naturalWidth*280)+"px";
  twCtx.drawImage(img,0,0);
  const id=twCtx.getImageData(0,0,twCv.width,twCv.height),d=id.data;
  for(let i=0;i<d.length;i+=4){
    const r=d[i],g=d[i+1],b=d[i+2];
    // Solo eliminar el gris del cuadriculado (gris claro alternado ~192 y ~255)
    // El cuadriculado tiene exactamente estos dos colores
    const isWhite = r>240 && g>240 && b>240;
    const isGray  = r>180 && r<210 && g>180 && g<210 && b>180 && b<210;
    if(isWhite || isGray) d[i+3]=0;
  }
  twCtx.putImageData(id,0,0);
  const iw=280,hx=iw*0.54,hy=8;
  for(let i=0;i<24;i++){
    const p=document.createElement("div");p.className="spark";
    const angle=Math.random()*Math.PI*2,dist=4+Math.random()*22,s=1.5+Math.random()*3.5;
    p.style.cssText=`--s:${s}px;--c:${cols[Math.floor(Math.random()*cols.length)]};--d:${1.4+Math.random()*2.6}s;--dl:${Math.random()*4}s;--x:${hx+Math.cos(angle)*dist}px;--y:${hy+Math.sin(angle)*dist}px;--tx:${(Math.random()-.5)*55}px;--ty:${-12-Math.random()*55}px;`;
    wrap.appendChild(p);
  }
};
img.src="twilight.png.jpeg";
</script>
</body>
</html>
