<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Twilight Sparkle - BNMA08</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #2c003e; /* Un morado oscuro que combina con ella */
            color: white;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }
        .card {
            background-color: #f3e5f5;
            padding: 30px;
            border-radius: 20px;
            text-align: center;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            max-width: 400px;
        }
        img {
            width: 100%;
            max-width: 300px;
            /* ESTA ES LA MAGIA PARA QUITAR EL FONDO BLANCO */
            mix-blend-mode: multiply; 
            filter: contrast(110%);
        }
        h1 {
            color: #6a1b9a;
            margin-top: 10px;
        }
        p {
            color: #4a148c;
            font-weight: bold;
        }
    </style>
</head>
<body>

    <div class="card">
        <!-- He puesto el link directo de la imagen que me pasaste -->
        <img src="https://vignette.wikia.nocookie.net/p__/images/3/30/Twilight_Sparkle_Alicorn_Vector.png/revision/latest?cb=20140320184422&path-prefix=protagonist" alt="Twilight Sparkle">
        <h1>Twilight Sparkle</h1>
        <p>Proyecto Personal - BNMA08</p>
    </div>

</body>
</html>
